media:
  input: public/uploads
  output: /uploads
  categories: [image]
  rename: safe

content:
  - name: posts
    label: 博客文章
    type: collection
    path: src/content/blog
    format: yaml-frontmatter
    filename:
      template: "{year}-{month}-{day}-{primary}.md"
      field: create
    view:
      primary: title
      sort: pubDate
      order: desc
    fields:
      - name: title
        label: 标题
        type: string
        required: true
      - name: description
        label: 摘要
        type: text
        required: true
      - name: pubDate
        label: 发布日期
        type: date
        required: true
        options:
          format: yyyy-MM-dd
      - name: updatedDate
        label: 更新日期
        type: date
        options:
          format: yyyy-MM-dd
      - name: tags
        label: 标签
        type: string
        list: true
      - name: body
        label: 正文
        type: rich-text
        required: true
        options:
          format: markdown
